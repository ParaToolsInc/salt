name: lint
on:
  push:
  pull_request:

jobs:
  lint:
    name: lint
    # ubuntu-slim is a 1-core, container-based standard runner with a
    # minimal preinstalled toolset (shellcheck included). Free on
    # public repos, 15 min hard job cap. Plenty for a ~30 s lint job.
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      # shellcheck is preinstalled on ubuntu-slim; no apt step needed.
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Install cmake-lint
        run: uv tool install cmakelang --with pyyaml
      - name: shellcheck
        run: |
          shellcheck --shell=bash \
            activate-salt-fm-env.sh \
            build_and_test.sh \
            .githooks/pre-commit \
            .githooks/pre-push \
            src/fparse-llvm.in \
            src/saltfm.in
      - name: cmake-lint
        run: cmake-lint CMakeLists.txt cmake/modules/*.cmake
