name: version-check
on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - '.VERSION'
      - '.github/workflows/version-check.yaml'

jobs:
  verify-version-matches-tag:
    name: tag matches .VERSION
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - name: Compare tag against .VERSION
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          declared="$(tr -d '[:space:]' < .VERSION)"
          echo "tag=${tag}"
          echo "declared=${declared}"
          if [ "${tag}" != "${declared}" ]; then
            ref="${GITHUB_REF#refs/tags/}"
            msg="Tag '${ref}' does not match .VERSION ('${declared}')."
            echo "::error::${msg}"
            exit 1
          fi

  verify-version-format:
    name: .VERSION is valid SemVer
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - name: Check .VERSION format
        run: |
          declared="$(tr -d '[:space:]' < .VERSION)"
          echo "declared=${declared}"
          re='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
          if ! [[ "${declared}" =~ $re ]]; then
            msg=".VERSION ('${declared}') is not valid SemVer"
            msg+=" (MAJOR.MINOR.PATCH[-PRERELEASE])."
            echo "::error::${msg}"
            exit 1
          fi
          if [[ "${declared}" == v* ]]; then
            msg=".VERSION must not include the 'v' prefix;"
            msg+=" that belongs on git tags only."
            echo "::error::${msg}"
            exit 1
          fi
